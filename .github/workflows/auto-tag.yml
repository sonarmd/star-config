name: Auto Tag Version

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_channel:
        description: 'Release channel'
        required: true
        default: 'rc'
        type: choice
        options:
          - rc
          - ga
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

env:
  BUMP_DEFAULT: patch

jobs:
  rc-tag:
    name: Tag RC on PR
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f2ed94f21bf2f2e36 # v4.4.0
        with:
          node-version: '22'

      - name: Create RC tag
        id: rc
        env:
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node --input-type=module <<'NODE'
          import {
            run, latestGaTag, latestRcTag, greaterVersion,
            bumpVersion, detectBumpFromText, shouldSkip, tagAndPush,
          } from "./scripts/version-utils.mjs";

          const env = process.env;
          const targetSha = env.TARGET_SHA;
          if (!targetSha) {
            throw new Error("TARGET_SHA is required");
          }

          const labels = (() => {
            try {
              return JSON.parse(env.PR_LABELS || "[]");
            } catch {
              return [];
            }
          })();
          const labelNames = labels.map((l) => (l.name || "").toLowerCase());

          let bumpType = (env.BUMP_DEFAULT || "patch").toLowerCase();
          const majorLabels = new Set(["semver:major", "release:major", "version:major", "major"]);
          const minorLabels = new Set(["semver:minor", "release:minor", "version:minor", "minor"]);

          if (labelNames.some((n) => majorLabels.has(n))) {
            bumpType = "major";
          } else if (labelNames.some((n) => minorLabels.has(n))) {
            bumpType = "minor";
          }

          const commitMessage = run("git log -1 --pretty=%B").toLowerCase();
          const prTitle = (env.PR_TITLE || "").toLowerCase();

          if (shouldSkip(commitMessage) || shouldSkip(prTitle)) {
            console.log("Skip directive found; exiting without tagging.");
            process.exit(0);
          }

          bumpType = detectBumpFromText(commitMessage, bumpType);
          bumpType = detectBumpFromText(prTitle, bumpType);

          const gaBase = latestGaTag();
          const rcTag = latestRcTag();
          const rcBase = rcTag ? rcTag.replace(/_rc$/, "") : gaBase;
          const baseTag = greaterVersion(gaBase, rcBase);
          const nextVersion = bumpVersion(baseTag, bumpType);
          const tagName = `v${nextVersion}_rc`;

          tagAndPush(tagName, targetSha);
          console.log(`Created ${tagName} from ${baseTag} (${bumpType}) at ${targetSha}`);
          NODE

      - name: Tag summary
        if: steps.rc.outputs.tag != ''
        run: |
          echo "Created ${{ steps.rc.outputs.tag }}"
          {
            echo "## Auto-tag RC"
            echo "- Tag: ${{ steps.rc.outputs.tag }}"
            echo "- Commit: ${{ github.event.pull_request.head.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger release workflow
        if: steps.rc.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.rc.outputs.tag }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag_name\":\"${TAG_NAME}\"}}"

  ga-tag:
    name: Tag GA on main push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f2ed94f21bf2f2e36 # v4.4.0
        with:
          node-version: '22'

      - name: Create GA tag
        id: ga
        env:
          TARGET_SHA: ${{ github.sha }}
        run: |
          node --input-type=module <<'NODE'
          import {
            run, latestGaTag, latestRcTag, bumpVersion,
            detectBumpFromText, shouldSkip, tagAndPush,
          } from "./scripts/version-utils.mjs";

          const env = process.env;
          const targetSha = env.TARGET_SHA;
          if (!targetSha) {
            throw new Error("TARGET_SHA is required");
          }

          let tagName = "";
          let baseTag = "";
          let bumpType = "";

          // Prefer promoting the latest RC (strip _rc suffix)
          const latestRc = latestRcTag();
          if (latestRc) {
            const base = latestRc.replace(/_rc$/, "");
            const existing = run(`git tag -l '${base}'`);
            if (existing) {
              console.log(`GA tag ${base} already exists; skipping.`);
              process.exit(0);
            }
            tagName = base;
            baseTag = latestRc;
            bumpType = "promote";
          } else {
            bumpType = (env.BUMP_DEFAULT || "patch").toLowerCase();
            const commitMessage = run("git log -1 --pretty=%B").toLowerCase();

            if (shouldSkip(commitMessage)) {
              console.log("Skip directive found; exiting without tagging.");
              process.exit(0);
            }

            bumpType = detectBumpFromText(commitMessage, bumpType);
            baseTag = latestGaTag();
            const nextVersion = bumpVersion(baseTag, bumpType);
            tagName = `v${nextVersion}`;
          }

          tagAndPush(tagName, targetSha);
          console.log(`Created ${tagName} from ${baseTag} (${bumpType}) at ${targetSha}`);
          NODE

      - name: Tag summary
        if: steps.ga.outputs.tag != ''
        run: |
          echo "Created ${{ steps.ga.outputs.tag }}"
          {
            echo "## Auto-tag GA"
            echo "- Tag: ${{ steps.ga.outputs.tag }}"
            echo "- Commit: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger release workflow
        if: steps.ga.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.ga.outputs.tag }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag_name\":\"${TAG_NAME}\"}}"

  manual-tag:
    name: Tag manually
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f2ed94f21bf2f2e36 # v4.4.0
        with:
          node-version: '22'

      - name: Create manual tag
        id: manual
        env:
          RELEASE_CHANNEL: ${{ github.event.inputs.release_channel }}
          BUMP_DEFAULT: ${{ github.event.inputs.bump_type }}
        run: |
          TARGET_SHA=$(git rev-parse HEAD)
          export TARGET_SHA
          node --input-type=module <<'NODE'
          import {
            run, latestGaTag, latestRcTag, bumpVersion, tagAndPush,
          } from "./scripts/version-utils.mjs";

          const env = process.env;
          const targetSha = env.TARGET_SHA;
          if (!targetSha) {
            throw new Error("TARGET_SHA is required");
          }

          let tagName = "";
          let baseTag = "";
          let bumpType = (env.BUMP_DEFAULT || "patch").toLowerCase();
          const channel = (env.RELEASE_CHANNEL || "rc").toLowerCase();

          if (channel === "ga") {
            const rc = latestRcTag();
            if (rc) {
              tagName = rc.replace(/_rc$/, "");
              baseTag = rc;
              bumpType = "promote";
            } else {
              baseTag = latestGaTag();
              const nextVersion = bumpVersion(baseTag, bumpType);
              tagName = `v${nextVersion}`;
            }
          } else {
            baseTag = latestGaTag();
            const nextVersion = bumpVersion(baseTag, bumpType);
            tagName = `v${nextVersion}_rc`;
          }

          tagAndPush(tagName, targetSha);
          console.log(`Created ${tagName} from ${baseTag} (${bumpType}) at ${targetSha}`);
          NODE

      - name: Tag summary
        if: steps.manual.outputs.tag != ''
        run: |
          echo "Created ${{ steps.manual.outputs.tag }}"
          {
            echo "## Manual tag"
            echo "- Tag: ${{ steps.manual.outputs.tag }}"
            echo "- Commit: $(git rev-parse HEAD)"
            echo "- Channel: ${{ github.event.inputs.release_channel }}"
            echo "- Bump: ${{ github.event.inputs.bump_type }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger release workflow
        if: steps.manual.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.manual.outputs.tag }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag_name\":\"${TAG_NAME}\"}}"
