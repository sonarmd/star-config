name: Auto Tag Version

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_channel:
        description: 'Release channel'
        required: true
        default: 'rc'
        type: choice
        options: [rc, ga]
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  actions: write

jobs:
  rc-tag:
    name: Tag RC on PR
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Create RC tag
        id: rc
        env:
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import {latestGaTag, latestRcTag, bumpVersion, detectBumpType, shouldSkip, run} from './scripts/version-utils.mjs';

          const {TARGET_SHA, PR_LABELS, PR_TITLE} = process.env;
          const commitMessage = run('git log -1 --pretty=%B').toLowerCase();
          const prTitle = (PR_TITLE || '').toLowerCase();

          if (shouldSkip(commitMessage, prTitle)) {
            console.log('Skip directive found; exiting without tagging.');
            process.exit(0);
          }

          const labels = JSON.parse(PR_LABELS || '[]');
          const bumpType = detectBumpType(commitMessage, prTitle, labels);

          const gaBase = latestGaTag();
          const rcBase = (latestRcTag() || gaBase).replace(/_rc$/, '');
          const baseTag = [gaBase, rcBase].sort().pop();
          const tagName = `v${bumpVersion(baseTag, bumpType)}_rc`;

          if (run(`git tag -l '${tagName}'`)) {
            console.log(`Tag ${tagName} already exists; skipping.`);
            process.exit(0);
          }

          run(`git tag ${tagName} ${TARGET_SHA}`);
          run(`git push origin ${tagName}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tagName}\n`);
          console.log(`Created ${tagName} (${bumpType} from ${baseTag})`);
          NODE

      - if: steps.rc.outputs.tag != ''
        run: |
          echo "## Auto-tag RC" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.rc.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger release
        if: steps.rc.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref main -f tag_name=${{ steps.rc.outputs.tag }}

  ga-tag:
    name: Tag GA on main push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Create GA tag
        id: ga
        env:
          TARGET_SHA: ${{ github.sha }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import {latestGaTag, latestRcTag, bumpVersion, shouldSkip, run} from './scripts/version-utils.mjs';

          const {TARGET_SHA} = process.env;
          const commitMessage = run('git log -1 --pretty=%B').toLowerCase();

          if (shouldSkip(commitMessage, '')) {
            console.log('Skip directive found; exiting.');
            process.exit(0);
          }

          let tagName, tagSource;
          const rc = latestRcTag();
          if (rc) {
            tagName = rc.replace(/_rc$/, '');
            tagSource = `promoted from ${rc}`;
          } else {
            const baseTag = latestGaTag();
            const bumpType = /\[major\]|#major/.test(commitMessage) ? 'major'
              : /\[minor\]|#minor/.test(commitMessage) ? 'minor' : 'patch';
            tagName = `v${bumpVersion(baseTag, bumpType)}`;
            tagSource = `${bumpType} from ${baseTag}`;
          }

          if (run(`git tag -l '${tagName}'`)) {
            console.log(`Tag ${tagName} already exists; skipping.`);
            process.exit(0);
          }

          run(`git tag ${tagName} ${TARGET_SHA}`);
          run(`git push origin ${tagName}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tagName}\n`);
          console.log(`Created ${tagName} (${tagSource})`);
          NODE

      - if: steps.ga.outputs.tag != ''
        run: |
          echo "## Auto-tag GA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.ga.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger release
        if: steps.ga.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref main -f tag_name=${{ steps.ga.outputs.tag }}

  manual-tag:
    name: Manual tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Create tag
        id: manual
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import {latestGaTag, latestRcTag, bumpVersion, run} from './scripts/version-utils.mjs';

          const {RELEASE_CHANNEL, BUMP_TYPE} = process.env;
          const targetSha = run('git rev-parse HEAD');

          let tagName, tagSource;
          if (RELEASE_CHANNEL === 'ga') {
            const rc = latestRcTag();
            if (rc) {
              tagName = rc.replace(/_rc$/, '');
              tagSource = `promoted from ${rc}`;
            } else {
              tagName = `v${bumpVersion(latestGaTag(), BUMP_TYPE)}`;
              tagSource = `${BUMP_TYPE} from ${latestGaTag()}`;
            }
          } else {
            tagName = `v${bumpVersion(latestGaTag(), BUMP_TYPE)}_rc`;
            tagSource = `${BUMP_TYPE} from ${latestGaTag()}`;
          }

          if (run(`git tag -l '${tagName}'`)) {
            console.log(`Tag ${tagName} already exists; skipping.`);
            process.exit(0);
          }

          run(`git tag ${tagName} ${targetSha}`);
          run(`git push origin ${tagName}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tagName}\n`);
          console.log(`Created ${tagName} (${tagSource})`);
          NODE

      - if: steps.manual.outputs.tag != ''
        run: |
          echo "## Manual tag" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.manual.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger release
        if: steps.manual.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref main -f tag_name=${{ steps.manual.outputs.tag }}
