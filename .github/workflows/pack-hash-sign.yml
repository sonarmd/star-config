name: Pack, hash, and sign

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

jobs:
  package:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (no scripts)
        run: npm install --ignore-scripts

      - name: Pack module
        id: pack
        run: |
          npm pack --json > pack-result.json
          tarball=$(node -p "const f=require('./pack-result.json'); f[0].filename")
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          shasum -a 256 "$TARBALL" > checksums.txt

      - name: Upload package and checksum
        uses: actions/upload-artifact@v4
        with:
          name: star-config-artifacts-${{ github.run_id }}
          path: |
            ${{ steps.pack.outputs.tarball }}
            checksums.txt

      - name: Import GPG key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign checksum
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: gpg --batch --yes --armor --detach-sign --output checksums.txt.asc checksums.txt

      - name: Upload signature
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: star-config-checksum-signature-${{ github.run_id }}
          path: checksums.txt.asc
