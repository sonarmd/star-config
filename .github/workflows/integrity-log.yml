name: Append integrity log

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

permissions:
  contents: write

jobs:
  append-log:
    if: github.actor != 'github-actions[bot]' && contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (no scripts)
        run: npm install --ignore-scripts

      - name: Pack module
        id: pack
        run: |
          npm pack --json > pack-result.json
          tarball=$(node -p "const f=require('./pack-result.json'); f[0].filename")
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          shasum -a 256 "$TARBALL" > checksums.txt

      - name: Append integrity log
        env:
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          TAR: ${{ steps.pack.outputs.tarball }}
          SSH_KEYS: ${{ secrets.SSH_PUBLIC_KEYS }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          checksum=$(cut -d' ' -f1 checksums.txt)
          {
            echo "## $ts - $SHA"
            echo "- ref: $REF"
            echo "- tarball: $TAR"
            echo "- sha256: $checksum"
            echo "- gpg_key_id: ${GPG_KEY_ID:-not_provided}"
            echo "- ssh_public_keys:"
            if [ -n "$SSH_KEYS" ]; then
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                echo "  - $line"
              done <<< "$SSH_KEYS"
            else
              echo "  - not_provided"
            fi
            echo
          } >> integrity-log.md

      - name: Commit and push log entry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add integrity-log.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: append integrity log [skip ci]"
          git push
