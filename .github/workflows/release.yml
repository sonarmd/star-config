name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*_rc'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g., v1.2.3 or v1.2.3_rc)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_TAG" ]; then
              echo "workflow_dispatch requires tag_name input" >&2
              exit 1
            fi
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ steps.tag.outputs.tag_name }}"

      - name: Resolve commit SHA
        id: resolve
        run: |
          commit=$(git rev-parse "refs/tags/${{ steps.tag.outputs.tag_name }}^{commit}")
          echo "commit_sha=$commit" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f2ed94f21bf2f2e36 # v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Pack and checksum
        id: pack
        run: |
          mkdir -p dist
          yarn pack --filename dist/sonarmd-star-config.tgz
          cd dist
          sha256sum sonarmd-star-config.tgz > checksums.txt
          echo "tarball=dist/sonarmd-star-config.tgz" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          prev_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname \
            | grep -v '_rc$' \
            | grep -v "^${TAG_NAME}$" \
            | head -n1)
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$prev_tag" ]; then
              git log --pretty=format:"- %s (%h)" "${prev_tag}..${COMMIT_SHA}" --
            else
              git log --pretty=format:"- %s (%h)" "${COMMIT_SHA}" -10 --
            fi
            echo ""
            echo ""
            echo "## Checksums"
            echo '```'
            cat dist/checksums.txt
            echo '```'
          } > release-notes.md

      - name: Collect assets
        id: assets
        run: |
          files="dist/sonarmd-star-config.tgz dist/checksums.txt"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          FILES: ${{ steps.assets.outputs.files }}
        run: |
          prerelease=false
          if echo "$TAG_NAME" | grep -qi "_rc$"; then
            prerelease=true
          fi
          # shellcheck disable=SC2086
          gh release create "$TAG_NAME" $FILES \
            --title "Release $TAG_NAME" \
            --notes-file release-notes.md \
            --prerelease="$prerelease"

      - name: Release summary
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          {
            echo "## Release"
            echo "- Tag: $TAG_NAME"
            echo "- Commit: $COMMIT_SHA"
            echo "- Assets: ${{ steps.assets.outputs.files }}"
          } >> "$GITHUB_STEP_SUMMARY"
