name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*_rc'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g., v1.2.3 or v1.2.3_rc)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_TAG" ]; then
              echo "workflow_dispatch requires tag_name input" >&2
              exit 1
            fi
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ steps.tag.outputs.tag_name }}"

      - name: Resolve commit SHA
        id: resolve
        run: |
          commit=$(git rev-parse "refs/tags/${{ steps.tag.outputs.tag_name }}^{commit}")
          echo "commit_sha=$commit" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install and build
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Pack and checksum
        run: node scripts/pack-and-checksum.js

      - name: Generate release notes
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
          PACKAGES_FILE: dist/pack-output.json
          CHECKSUMS_FILE: dist/checksums.txt
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-release-notes.js

      - name: Collect assets
        id: assets
        run: |
          files=$(paste -sd' ' dist/assets.txt)
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          prerelease=false
          if echo "$TAG_NAME" | grep -qi "_rc$"; then
            prerelease=true
          fi
          gh release create "$TAG_NAME" $(echo "${{ steps.assets.outputs.files }}") \
            --title "Release $TAG_NAME" \
            --notes-file release-notes.md \
            --prerelease=$prerelease

      - name: Release summary
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          {
            echo "## Release"
            echo "- Tag: $TAG_NAME"
            echo "- Commit: $COMMIT_SHA"
            echo "- Assets: ${{ steps.assets.outputs.files }}"
          } >> "$GITHUB_STEP_SUMMARY"
