name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*_rc"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g., v1.2.3 or v1.2.3_rc)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_TAG" ]; then
              echo "workflow_dispatch requires tag_name input" >&2
              exit 1
            fi
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ steps.tag.outputs.tag_name }}"

      - name: Resolve commit SHA
        id: resolve
        run: |
          commit=$(git rev-parse "refs/tags/${{ steps.tag.outputs.tag_name }}^{commit}")
          echo "commit_sha=$commit" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20

      - name: Yarn version
        run: yarn --version

      - name: Pack workspaces and checksums
        run: node scripts/pack-and-checksum.js

      - name: Generate release notes
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
          PACKAGES_FILE: dist/pack-output.json
          CHECKSUMS_FILE: dist/checksums.txt
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-release-notes.js

      - name: Load GPG Key from 1Password
        if: ${{ env.OP_SERVICE_ACCOUNT_TOKEN != '' }}
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ env.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT: CI/CD
          OP_GPG_ITEM: GPG-Signing-Key
          OP_GPG_ITEM_ID: ${{ secrets.OP_GPG_ITEM_ID }}
        run: |
          # Install 1Password CLI
          curl -sS https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-amd64-latest.deb -o op.deb
          sudo dpkg -i op.deb

          # Resolve the item to use (ID takes precedence; otherwise ensure a single match)
          ITEM_TO_USE="$OP_GPG_ITEM"
          if [ -n "${OP_GPG_ITEM_ID:-}" ]; then
            ITEM_TO_USE="$OP_GPG_ITEM_ID"
          else
            matches="$(op item list --vault "$OP_VAULT" --format json | jq -r --arg name "$OP_GPG_ITEM" '.[] | select(.title==$name) | .id')"
            count=$(echo "$matches" | grep -c . || true)
            if [ "$count" -gt 1 ]; then
              echo "Multiple 1Password items titled \"$OP_GPG_ITEM\" found in vault \"$OP_VAULT\". Set secret OP_GPG_ITEM_ID to one of:" >&2
              echo "$matches" >&2
              exit 1
            elif [ "$count" -eq 1 ]; then
              ITEM_TO_USE="$matches"
            fi
          fi

          # Get the GPG key directly into GPG - never hits disk
          op document get "$ITEM_TO_USE" --vault="$OP_VAULT" | gpg --batch --import

          # Configure git
          KEY_ID=$(
            gpg --list-secret-keys --keyid-format LONG \
              | awk '/^sec/{print $2}' \
              | cut -d'/' -f2 \
              | head -n1
          )
          git config --global user.signingkey "$KEY_ID"
          git config --global commit.gpgsign true
          echo "Loaded GPG key $KEY_ID from 1Password"

      - name: Sign checksum (optional)
        if: ${{ env.OP_SERVICE_ACCOUNT_TOKEN != '' }}
        run: gpg --batch --yes --armor --detach-sign --output dist/checksums.txt.asc dist/checksums.txt

      - name: Collect assets
        id: assets
        run: |
          files=$(paste -sd' ' dist/assets.txt)
          if [ -f dist/checksums.txt.asc ]; then
            files="$files dist/checksums.txt.asc"
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          prerelease=false
          if echo "$TAG_NAME" | grep -qi "_rc$"; then
            prerelease=true
          fi
          gh release create "$TAG_NAME" $(echo "${{ steps.assets.outputs.files }}") \
            --title "Release $TAG_NAME" \
            --notes-file release-notes.md \
            --prerelease=$prerelease
