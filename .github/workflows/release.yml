name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*_rc"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g., v1.2.3 or v1.2.3_rc)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_TAG" ]; then
              echo "workflow_dispatch requires tag_name input" >&2
              exit 1
            fi
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ steps.tag.outputs.tag_name }}"

      - name: Resolve commit SHA
        id: resolve
        run: |
          commit=$(git rev-parse "refs/tags/${{ steps.tag.outputs.tag_name }}^{commit}")
          echo "commit_sha=$commit" >> "$GITHUB_OUTPUT"

      - name: Init log
        run: |
          mkdir -p dist
          : > dist/release.log
          echo "log_file=dist/release.log" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20

      - name: Yarn version
        run: yarn --version | tee -a dist/release.log

      - name: Pack workspaces and checksums
        run: node scripts/pack-and-checksum.js | tee -a dist/release.log

      - name: Generate release notes
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
          PACKAGES_FILE: dist/pack-output.json
          CHECKSUMS_FILE: dist/checksums.txt
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-release-notes.js | tee -a dist/release.log

      - name: Load GPG Key from 1Password
        id: gpg
        if: ${{ env.OP_SERVICE_ACCOUNT_TOKEN != '' }}
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ env.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT: CI/CD
          OP_GPG_ITEM: GPG-Signing-Key
          OP_GPG_ITEM_ID: ${{ secrets.OP_GPG_ITEM_ID }}
          OP_GPG_EXPECTED_FPR: ${{ secrets.OP_GPG_EXPECTED_FPR }}
          LOG_FILE: dist/release.log
        run: |
          set -euo pipefail

          log() {
            local msg="$1"
            printf '[%s] %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$msg" | tee -a "$LOG_FILE"
          }

          now_ts=$(date -u +%s)
          month_secs=$((30*24*3600))
          rotate_secs=$((5*30*24*3600))

          mkdir -p "$(dirname "$LOG_FILE")"
          touch "$LOG_FILE"

          log "Installing 1Password CLI"
          curl -sS https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-amd64-latest.deb -o op.deb
          sudo dpkg -i op.deb

          list_items_json="$(op item list --vault "$OP_VAULT" --format json | jq --arg name "$OP_GPG_ITEM" '[.[] | select(.title==$name)]')"

          fingerprint_for() {
            local item_id="$1"
            op document get "$item_id" --vault="$OP_VAULT" \
              | gpg --batch --import-options show-only --with-colons --import 2>/dev/null \
              | awk -F: '/^fpr:/{print $10; exit}'
          }

          mapfile -t ids < <(echo "$list_items_json" | jq -r '.[].id')
          declare -A FPR_BY_ID
          declare -A CREATED_BY_ID

          for id in "${ids[@]}"; do
            created=$(echo "$list_items_json" | jq -r --arg id "$id" '.[] | select(.id==$id) | .createdAt')
            fpr="$(fingerprint_for "$id" || true)"
            FPR_BY_ID["$id"]="$fpr"
            CREATED_BY_ID["$id"]="$created"
            log "Found item $id created $created fingerprint ${fpr:-none}"
          done

          chosen_id="${OP_GPG_ITEM_ID:-}"

          # If expected fingerprint is set but absent, quarantine and regenerate
          if [ -z "$chosen_id" ] && [ -n "${OP_GPG_EXPECTED_FPR:-}" ]; then
            found_match=false
            for id in "${ids[@]}"; do
              if [ "${FPR_BY_ID[$id]}" = "$OP_GPG_EXPECTED_FPR" ]; then
                chosen_id="$id"
                found_match=true
                log "Selected expected fingerprint $OP_GPG_EXPECTED_FPR at item $id"
                break
              fi
            done
            if [ "$found_match" = false ] && [ "${#ids[@]}" -gt 0 ]; then
              log "No item matches expected fingerprint $OP_GPG_EXPECTED_FPR; archiving all candidates"
              for id in "${ids[@]}"; do
                log "Archiving unexpected item $id"
                op item delete "$id" --vault "$OP_VAULT" --archive
              done
              ids=()
            fi
          fi

          # Deduplicate identical fingerprints (keep oldest)
          declare -A keep_for_fpr
          for id in "${ids[@]}"; do
            fpr="${FPR_BY_ID[$id]}"
            created="${CREATED_BY_ID[$id]}"
            if [ -z "$fpr" ]; then
              continue
            fi
            if [ -z "${keep_for_fpr[$fpr]+x}" ]; then
              keep_for_fpr["$fpr"]="$id"
            else
              keep_id="${keep_for_fpr[$fpr]}"
              keep_created="${CREATED_BY_ID[$keep_id]}"
              if [[ "$created" < "$keep_created" ]]; then
                log "Deleting duplicate item $keep_id with same fingerprint $fpr (keeping older $id)"
                op item delete "$keep_id" --vault "$OP_VAULT" --archive
                keep_for_fpr["$fpr"]="$id"
              else
                log "Deleting duplicate item $id with same fingerprint $fpr (keeping older $keep_id)"
                op item delete "$id" --vault "$OP_VAULT" --archive
              fi
            fi
          done

          # Refresh after dedupe/quarantine
          list_items_json="$(op item list --vault "$OP_VAULT" --format json | jq --arg name "$OP_GPG_ITEM" '[.[] | select(.title==$name)]')"
          mapfile -t ids < <(echo "$list_items_json" | jq -r '.[].id')

          if [ ${#ids[@]} -eq 0 ]; then
            log "No GPG items remain; generating new key"
            NEW_NAME="${GPG_NAME:-CI Release Key}"
            NEW_EMAIL="${GPG_EMAIL:-ci@sonarmd.com}"
            NEW_EXPIRE="${GPG_EXPIRE:-5m}"
            gpg --batch --yes --passphrase '' --quick-generate-key "$NEW_NAME <$NEW_EMAIL>" ed25519 sign "$NEW_EXPIRE"
            NEW_KEY_ID="$(gpg --list-secret-keys --keyid-format=long "$NEW_EMAIL" | awk '/^sec/{print $2}' | sed 's#.*/##' | head -n1)"
            PUB_TMP="$(mktemp)"
            PRIV_TMP="$(mktemp)"
            gpg --armor --export "$NEW_KEY_ID" > "$PUB_TMP"
            gpg --armor --export-secret-key "$NEW_KEY_ID" > "$PRIV_TMP"
            ITEM_JSON="$(op document create "$PRIV_TMP" --vault "$OP_VAULT" --title "$OP_GPG_ITEM" --format json)"
            ids=("$(echo "$ITEM_JSON" | jq -r '.id // .uuid')")
            list_items_json="$(op item list --vault "$OP_VAULT" --format json | jq --arg name "$OP_GPG_ITEM" '[.[] | select(.title==$name)]')"
          fi

          pick_latest_two() {
            echo "$list_items_json" | jq -r '[.[] | {id: .id, created: .createdAt}] | sort_by(.created) | reverse | .[0:2] | .[] | "\(.id)\t\(.created)"'
          }

          primary_id="$chosen_id"
          secondary_id=""

          if [ -z "$primary_id" ]; then
            primary_info=$(pick_latest_two | head -n1 || true)
            primary_id="${primary_info%%$'\t'*}"
          fi

          if [ -z "$primary_id" ]; then
            log "No primary key selected; generating new key"
            NEW_NAME="${GPG_NAME:-CI Release Key}"
            NEW_EMAIL="${GPG_EMAIL:-ci@sonarmd.com}"
            NEW_EXPIRE="${GPG_EXPIRE:-5m}"
            gpg --batch --yes --passphrase '' --quick-generate-key "$NEW_NAME <$NEW_EMAIL>" ed25519 sign "$NEW_EXPIRE"
            NEW_KEY_ID="$(gpg --list-secret-keys --keyid-format=long "$NEW_EMAIL" | awk '/^sec/{print $2}' | sed 's#.*/##' | head -n1)"
            PUB_TMP="$(mktemp)"
            PRIV_TMP="$(mktemp)"
            gpg --armor --export "$NEW_KEY_ID" > "$PUB_TMP"
            gpg --armor --export-secret-key "$NEW_KEY_ID" > "$PRIV_TMP"
            ITEM_JSON="$(op document create "$PRIV_TMP" --vault "$OP_VAULT" --title "$OP_GPG_ITEM" --format json)"
            primary_id="$(echo "$ITEM_JSON" | jq -r '.id // .uuid')"
            list_items_json="$(op item list --vault "$OP_VAULT" --format json | jq --arg name "$OP_GPG_ITEM" '[.[] | select(.title==$name)]')"
          fi

          secondary_info=$(pick_latest_two | sed -n '2p' || true)
          if [ -n "$secondary_info" ]; then
            secondary_id="${secondary_info%%$'\t'*}"
          fi

          primary_created=$(echo "$list_items_json" | jq -r --arg id "$primary_id" '.[] | select(.id==$id) | .createdAt')
          primary_ts=$(date -d "$primary_created" +%s)

          # Rotate if primary older than 5 months
          if [ $((now_ts - primary_ts)) -gt "$rotate_secs" ]; then
            log "Primary key older than 5 months; rotating"
            old_primary="$primary_id"
            NEW_NAME="${GPG_NAME:-CI Release Key}"
            NEW_EMAIL="${GPG_EMAIL:-ci@sonarmd.com}"
            NEW_EXPIRE="${GPG_EXPIRE:-5m}"
            gpg --batch --yes --passphrase '' --quick-generate-key "$NEW_NAME <$NEW_EMAIL>" ed25519 sign "$NEW_EXPIRE"
            NEW_KEY_ID="$(gpg --list-secret-keys --keyid-format=long "$NEW_EMAIL" | awk '/^sec/{print $2}' | sed 's#.*/##' | head -n1)"
            PUB_TMP="$(mktemp)"
            PRIV_TMP="$(mktemp)"
            gpg --armor --export "$NEW_KEY_ID" > "$PUB_TMP"
            gpg --armor --export-secret-key "$NEW_KEY_ID" > "$PRIV_TMP"
            ITEM_JSON="$(op document create "$PRIV_TMP" --vault "$OP_VAULT" --title "$OP_GPG_ITEM" --format json)"
            primary_id="$(echo "$ITEM_JSON" | jq -r '.id // .uuid')"
            log "Generated new key $NEW_KEY_ID stored as $primary_id"
            if [ -n "$old_primary" ]; then
              secondary_id="$old_primary"
            fi
            primary_created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            primary_ts=$now_ts
          fi

          # Retire secondary if older than ramp window
          if [ -n "$secondary_id" ]; then
            secondary_created=$(echo "$list_items_json" | jq -r --arg id "$secondary_id" '.[] | select(.id==$id) | .createdAt')
            secondary_ts=$(date -d "$secondary_created" +%s)
            if [ $((now_ts - secondary_ts)) -gt $((month_secs)) ]; then
              log "Secondary key $secondary_id beyond ramp window; archiving"
              op item delete "$secondary_id" --vault "$OP_VAULT" --archive
              secondary_id=""
            fi
          fi

          # Import keys
          unset GNUPGHOME
          log "Importing primary key item $primary_id"
          op document get "$primary_id" --vault="$OP_VAULT" | gpg --batch --import

          KEY_ID=$(
            gpg --list-secret-keys --keyid-format LONG \
              | awk '/^sec/{print $2}' \
              | cut -d'/' -f2 \
              | head -n1
          )
          KEY_FPR=$(
            gpg --list-secret-keys --with-colons \
              | awk -F: '/^fpr:/{print $10; exit}'
          )

          if [ -n "${OP_GPG_EXPECTED_FPR:-}" ] && [ "$OP_GPG_EXPECTED_FPR" != "$KEY_FPR" ]; then
            log "WARNING: Loaded fingerprint $KEY_FPR does not match expected $OP_GPG_EXPECTED_FPR (continuing with regenerated/selected key)"
          fi

          SECONDARY_KEY_ID=""
          SECONDARY_FPR=""
          if [ -n "$secondary_id" ]; then
            log "Importing secondary key item $secondary_id for dual-signing ramp"
            op document get "$secondary_id" --vault="$OP_VAULT" | gpg --batch --import
            SECONDARY_KEY_ID=$(
              gpg --list-secret-keys --keyid-format LONG \
                | awk '/^sec/{print $2}' \
                | cut -d'/' -f2 \
                | grep -v "$KEY_ID" \
                | head -n1
            )
            SECONDARY_FPR=$(
              gpg --list-secret-keys --with-colons \
                | awk -F: '/^fpr:/{print $10}' \
                | grep -v "$KEY_FPR" \
                | head -n1
            )
          fi

          git config --global user.signingkey "$KEY_ID"
          git config --global commit.gpgsign true
          log "Loaded GPG key $KEY_ID fingerprint $KEY_FPR from 1Password item $primary_id"
          if [ -n "$SECONDARY_KEY_ID" ]; then
            log "Loaded secondary key $SECONDARY_KEY_ID fingerprint $SECONDARY_FPR for dual-signing"
          fi
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$KEY_FPR" >> "$GITHUB_OUTPUT"
          echo "secondary_key_id=$SECONDARY_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "secondary_fingerprint=$SECONDARY_FPR" >> "$GITHUB_OUTPUT"

      - name: Sign checksum (optional)
        if: ${{ env.OP_SERVICE_ACCOUNT_TOKEN != '' }}
        env:
          PRIMARY_KEY: ${{ steps.gpg.outputs.key_id }}
          SECONDARY_KEY: ${{ steps.gpg.outputs.secondary_key_id }}
        run: |
          set -euo pipefail
          log_file="dist/release.log"
          echo "[sign] primary $PRIMARY_KEY" | tee -a "$log_file"
          gpg --batch --yes --armor --local-user "$PRIMARY_KEY" --detach-sign --output dist/checksums.txt.asc dist/checksums.txt | tee -a "$log_file"
          if [ -n "$SECONDARY_KEY" ]; then
            echo "[sign] secondary $SECONDARY_KEY" | tee -a "$log_file"
            gpg --batch --yes --armor --local-user "$SECONDARY_KEY" --detach-sign --output dist/checksums.txt.asc.secondary dist/checksums.txt | tee -a "$log_file"
          fi

      - name: Collect assets
        id: assets
        run: |
          files=$(paste -sd' ' dist/assets.txt)
          if [ -f dist/checksums.txt.asc ]; then
            files="$files dist/checksums.txt.asc"
          fi
          if [ -f dist/checksums.txt.asc.secondary ]; then
            files="$files dist/checksums.txt.asc.secondary"
          fi
          if [ -f dist/release.log ]; then
            files="$files dist/release.log"
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          prerelease=false
          if echo "$TAG_NAME" | grep -qi "_rc$"; then
            prerelease=true
          fi
          gh release create "$TAG_NAME" $(echo "${{ steps.assets.outputs.files }}") \
            --title "Release $TAG_NAME" \
            --notes-file release-notes.md \
            --prerelease=$prerelease

      - name: Release summary
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
          KEY_ID: ${{ steps.gpg.outputs.key_id }}
          KEY_FPR: ${{ steps.gpg.outputs.fingerprint }}
          SECONDARY_KEY_ID: ${{ steps.gpg.outputs.secondary_key_id }}
          SECONDARY_FPR: ${{ steps.gpg.outputs.secondary_fingerprint }}
        run: |
          {
            echo "## Release"
            echo "- Tag: $TAG_NAME"
            echo "- Commit: $COMMIT_SHA"
            if [ -n "$KEY_ID" ]; then
              echo "- GPG key: $KEY_ID ($KEY_FPR)"
            fi
            if [ -n "$SECONDARY_KEY_ID" ]; then
              echo "- Secondary key: $SECONDARY_KEY_ID ($SECONDARY_FPR) [dual-sign ramp]"
            fi
            echo "- Assets: ${{ steps.assets.outputs.files }}"
          } >> "$GITHUB_STEP_SUMMARY"
