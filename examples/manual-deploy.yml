# Example caller for the reusable manual-deploy workflow at sonarmd/workflows.
# Copy to .github/workflows/manual-deploy.yml in your consumer repo and replace
# __REPO_SHORT__ with your repo's tag prefix (e.g. "api", "fe", "mobile").
# This is a starting point — edit it to fit your project. Not auto-injected.
name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deploy mode'
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
          - redeploy
          - custom
      ref:
        description: 'Branch to deploy (blank = smart default)'
        type: string
        default: ''
      existing_tag:
        description: 'Tag to redeploy (redeploy mode only)'
        type: string
        default: ''
      custom_version:
        description: 'Version number (custom mode only, e.g. 4.5.1)'
        type: string
        default: ''
      custom_env:
        description: 'Environment (custom mode only)'
        type: choice
        default: stg
        options:
          - dev
          - stg
          - prd

permissions: {}

jobs:
  tag:
    uses: sonarmd/workflows/.github/workflows/manual-deploy.yml@main
    with:
      mode: ${{ inputs.mode }}
      repo-short: __REPO_SHORT__
      ref: ${{ inputs.ref }}
      existing-tag: ${{ inputs.existing_tag }}
      custom-version: ${{ inputs.custom_version }}
      custom-env: ${{ inputs.custom_env }}
    permissions:
      contents: write
