version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(deps)'
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10
    reviewers:
      - sonarmd/platform-eng

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'ci(deps)'
    groups:
      actions:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    reviewers:
      - sonarmd/platform-eng
