changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking
        - semver-major
    - title: Features
      labels:
        - enhancement
        - feature
        - feat
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
        - dependencies
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Other Changes
      labels:
        - '*'
  exclude:
    labels:
      - skip-changelog
